<section class="lp-testi">
  <div class="lp-testi__inner">
    <header class="lp-testi__head">
      <span class="lp-testi__ornament" aria-hidden="true"></span>
      <p class="lp-testi__label">Testimoni</p>
      <h2 class="lp-testi__title">
        Cerita pasangan yang <em>mempercayakan momennya.</em>
      </h2>
    </header>

    <div class="lp-testi__stats">
      <div class="testi-stat" *ngFor="let stat of stats">
        <span class="testi-stat__value">{{ stat.value }}</span>
        <span class="testi-stat__label">{{ stat.label }}</span>
      </div>
    </div>

    <div class="lp-testi__grid">
      <article
        class="testi-card"
        *ngFor="let review of reviews; trackBy: trackByCouple"
      >
        <span class="testi-card__quote" aria-hidden="true">&#8221;</span>

        <div class="testi-card__rating" aria-label="Rating 5 dari 5">
          <span class="testi-card__star">&#9733;</span>
          <span class="testi-card__star">&#9733;</span>
          <span class="testi-card__star">&#9733;</span>
          <span class="testi-card__star">&#9733;</span>
          <span class="testi-card__star">&#9733;</span>
        </div>

        <p class="testi-card__text">{{ review.text }}</p>

        <hr class="testi-card__divider" />

        <div class="testi-card__author">
          <span class="testi-card__avatar" aria-hidden="true">
            {{ getInitials(review.couple) }}
          </span>
          <div class="testi-card__meta">
            <span class="testi-card__name">{{ review.couple }}</span>
            <span class="testi-card__date">{{ review.date }}</span>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
